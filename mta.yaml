---
_schema-version: '3.1'
ID: tour-planner
version: 1.0.0
description: "An application to plan tours for service workers."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --production
        - npx -p @sap/cds-dk cds build --production
        - npx rimraf gen/db/src/gen/data/rwitt.tour.masterdata*

modules:
  - name: tour-planner-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api # required by consumers of CAP services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    requires:
      - name: tour-planner-db
      - name: tour-planner-auth

  - name: tour-planner-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: tour-planner-db

resources:
  - name: tour-planner-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana # or 'hanatrial' on trial landscapes
      service-plan: hdi-shared

  - name: tour-planner-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: tour-planner-${org}-${space}
        tenant-mode: dedicated
        role-collections:
          - name: 'TourPlanner'
            description: Tour Planner
            role-template-references:
              - $XSAPPNAME.TourPlanner
